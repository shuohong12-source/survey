{% extends "base.html" %}
{% block title %}{{ "注册" if mode == "register" else "登录" }}{% endblock %}
{% block content %}
<section class="panel narrow">
    <h1>{{ "用户注册" if mode == "register" else "用户登录" }}</h1>
    <form method="post" class="form">
        <label>
            用户名
            <input name="username" required>
        </label>
        <label>
            密码
            <input name="password" type="password" required>
        </label>
        <button class="button" type="submit">{{ "注册" if mode == "register" else "登录" }}</button>
    </form>
</section>
{% endblock %}
